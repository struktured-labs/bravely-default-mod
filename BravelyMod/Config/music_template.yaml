  # bgmevt_07:                               # Event theme 7 (sorrow/loss)
  # bgmevt_08:                               # Event theme 8 (hope/resolve)
  # bgmevt_09:                               # Event theme 9 (climax buildup)
  # bgmevt_10:                               # Event theme 10 (finale moments)
